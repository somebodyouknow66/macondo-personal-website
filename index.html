<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
    <script src="catify/catify.js" defer></script>
    <title>My Personal Website</title>
</head>
<body onload="catify();">
<section class="hero-section">
    <div class="burst-menu">
        <span class="click-me-text" tooltip="psst.. the typo is intentional"><span class="typo">clik</span> me</span>
        <img src="images/arrow-doodle.svg" alt="arrow doodle" class="arrow-doodle">
    <div class="avatar">
        <img src="images/me.png" alt="somebodyouknow's avatar" class="avatar-img">
    </div>
    <a href="#" class="icon twitter"><i class="fa-brands fa-x-twitter"></i></a>
    <a href="#" class="icon github"><i class="fa-brands fa-github"></i></a>
    <a href="#" class="icon instagram"><i class="fa-brands fa-instagram"></i></a>
    <a href="#" class="icon linkedin"><i class="fa-brands fa-linkedin"></i></a>
</div>
    <h1>Hi, I am somebodyouknow!</h1>
</section>

<nav class="dock" aria-label="dock">
    <div class="dock-items">
        <button class="dock-item" data-modal="projects" tooltip="Projects" aria-label="Open projects">
            <i class="fa-solid fa-diagram-project"></i>
        </button>
         <button class="dock-item" data-modal="experience" tooltip="Experience" aria-label="Open experience">
            <i class="fa-solid fa-briefcase"></i>
        </button>
         <button class="dock-item" data-modal="notes" tooltip="Notes" aria-label="Open personal notes">
            <i class="fa-solid fa-note-sticky"></i>
        </button>
         <button class="dock-item" data-modal="about" tooltip="About me" aria-label="Open about me">
            <i class="fa-solid fa-user"></i>
        </button>
    </div>
</nav>


<div class="modal-overlay" role="dialog" aria-modal="true">
<div class="modal-window">
    <div class="modal-titlebar">
        <div class="modal-traffic-lights">
            <button class="modal-tl modal-close">
                <svg width="6" height="6" viewBox="0 0 6 6"><path d="M1 1l4 4M5 1l-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <button class="modal-tl modal-minimize" tabindex="-1"></button>
          <button class="modal-tl modal-maximise"></button>
        </div>
        <span class="modal-title-text"></span>
    </div>
</div>
<div class="modal-body">
    <nav class="modal-sidebar">
        <button class="modal-nav-item" data-section="projects"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></button>
        <button class="modal-nav-item" data-section="experience"><i class="fa-solid fa-briefcase"></i><span>Experience</span></button>
        <button class="modal-nav-item" data-section="notes"><i class="fa-solid fa-note-sticky"></i><span>Notes</span></button>
        <button class="modal-nav-item" data-section="about"><i class="fa-solid fa-user"></i><span>About me</span></button>
    </nav>
    <div class="modal-content" id="modal-content"></div>
</div>
</div>

</body>
</html>
